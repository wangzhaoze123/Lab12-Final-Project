# ============================================
# GitHub Actions CI/CD Workflow
# Builds Docker images and deploys using Docker Compose
# ============================================
name: Build and Deploy

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Docker Buildx for faster builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Build and deploy both services with Docker Compose
      - name: Build and Deploy with Docker Compose
        run: |
          docker compose up -d --build

      # Step 4: Verify containers are running
      - name: Verify Running Containers
        run: |
          echo "Waiting for services to start..."
          sleep 5
          echo "=== Running Containers ==="
          docker compose ps
          echo "=== All Containers ==="
          docker ps

      # Step 5: Health check - Personal Website
      - name: Health Check - Personal Website
        run: |
          echo "Checking Personal Website on port 8080..."
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080) && break || sleep 2
          done
          echo "HTTP Status: ${STATUS:-timeout}"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "304" ]; then
            echo "✅ Personal Website is healthy!"
          else
            echo "⚠️ Personal Website returned status: ${STATUS:-timeout}"
          fi

      # Step 6: Health check - Todo App
      - name: Health Check - Todo App
        run: |
          echo "Checking Todo App on port 8081..."
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8081) && break || sleep 2
          done
          echo "HTTP Status: ${STATUS:-timeout}"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "304" ]; then
            echo "✅ Todo App is healthy!"
          else
            echo "⚠️ Todo App returned status: ${STATUS:-timeout}"
          fi

      # Step 7: Display deployment summary
      - name: Deployment Summary
        run: |
          echo "=========================================="
          echo "   ✅ Deployment Completed Successfully!  "
          echo "=========================================="
          echo "Personal Website: http://localhost:8080"
          echo "Todo Application: http://localhost:8081"
          echo "=========================================="
